<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalkBack</title>
    <style>
      @font-face {
        font-family: 'Outfit';
        src: url('./assets/fonts/Outfit-400.ttf') format('truetype');
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Outfit';
        src: url('./assets/fonts/Outfit-500.ttf') format('truetype');
        font-style: normal;
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: 'Outfit';
        src: url('./assets/fonts/Outfit-600.ttf') format('truetype');
        font-style: normal;
        font-weight: 600;
        font-display: swap;
      }
      :root {
        --font-ui: 'Outfit', 'Inter', 'Ubuntu', 'Cantarell', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        --bg-color: #0f1115;
        --surface-color: #1a1d24;
        --border-color: #2a2d35;
        --text-main: #f0f2f5;
        --text-muted: #9ba1b0;
        --accent: #60a5fa;
        --accent-hover: #3b82f6;
        --popup-bg: #2d313a;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-family: var(--font-ui);
      }
      body {
        font-family: var(--font-ui);
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      button, input, textarea, select {
        font-family: inherit;
      }
      main {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      .logo {
        margin-bottom: 20px;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        color: var(--text-main);
      }
      p.subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
      }
      #popup {
        min-height: 60px;
        padding: 16px;
        background-color: var(--popup-bg);
        border-radius: 8px;
        border: 1px solid var(--border-color);
        margin-bottom: 24px;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.5;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        /* Subtle glow if active, could toggle class later */
      }
      #popup:empty {
        display: none;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      button {
        background-color: var(--surface-color);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      button:hover {
        background-color: var(--border-color);
        border-color: var(--accent);
      }
      button:active {
        transform: translateY(1px);
      }
      button svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      button#demo {
        background-color: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      button#demo:hover {
        background-color: var(--accent-hover);
        border-color: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="14" width="48" height="32" rx="12" fill="var(--surface-color)" stroke="var(--accent)" stroke-width="3"/>
          <path d="M 20 46 L 16 56 L 28 46 Z" fill="var(--surface-color)" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/>
          <rect x="20" y="24" width="4" height="12" rx="2" fill="var(--accent)" />
          <rect x="30" y="20" width="4" height="20" rx="2" fill="var(--accent)" />
          <rect x="40" y="26" width="4" height="8" rx="2" fill="var(--accent)" />
        </svg>
      </div>
      <h1>TalkBack</h1>
      <p class="subtitle">Reactive laptop personality app</p>
      
      <section>
        <div id="popup" role="status" aria-live="polite"></div>
        <div class="actions">
          <button id="demo" type="button">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Run Demo Output
          </button>
          <button id="demo-moment" type="button">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            Run Demo Moment
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="../../dist/src/renderer/index.js"></script>
  </body>
</html>
